<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search</title>
  <link rel="stylesheet" href="settings.css" />
</head>
<body>
  <div class="page">
    <header class="header">
      <a class="back" href="settings.html" aria-label="Back">‹</a>
      <div>
        <div class="title">Search</div>
        <div class="subtitle">Spotlight behavior</div>
      </div>
    </header>

    <main class="content" aria-label="Search settings">
      <section class="section">
        <div class="section-title">Spotlight</div>
        <div class="group">
          <div class="row">
            <div class="row-left">
              <div class="row-label">Enable Spotlight Search</div>
            </div>
            <div class="row-right">
              <label class="switch" aria-label="Enable Spotlight search">
                <input id="enableSpotlightSearch" name="enableSpotlightSearch" type="checkbox" />
                <span class="slider"></span>
              </label>
            </div>
          </div>

          <div class="row">
            <div class="row-left">
              <div class="row-label">Search on Enter</div>
              <div class="row-sub">Press Enter to search</div>
            </div>
            <div class="row-right">
              <label class="switch" aria-label="Search on Enter">
                <input id="searchOnEnter" name="searchOnEnter" type="checkbox" />
                <span class="slider"></span>
              </label>
            </div>
          </div>

          <div class="row">
            <div class="row-left">
              <div class="row-label">Show Suggestions</div>
              <div class="row-sub">Keeps browser suggestions enabled</div>
            </div>
            <div class="row-right">
              <label class="switch" aria-label="Show search suggestions">
                <input id="showSearchSuggestions" name="showSearchSuggestions" type="checkbox" />
                <span class="slider"></span>
              </label>
            </div>
          </div>
        </div>

        <div class="footer-note" id="status" role="status" aria-live="polite"></div>
      </section>
    </main>
  </div>

  <script src="../settingsStore.js"></script>
  <script src="search.js"></script>
</body>
</html>
