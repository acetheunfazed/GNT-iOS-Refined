<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shortcuts</title>
  <link rel="stylesheet" href="settings.css" />
</head>
<body>
  <div class="page">
    <header class="header">
      <a class="back" href="settings.html" aria-label="Back">‹</a>
      <div>
        <div class="title">Shortcuts</div>
        <div class="subtitle">Quick access links</div>
      </div>
    </header>

    <main class="content" aria-label="Shortcuts settings">
      <section class="section">
        <div class="section-title">Visibility</div>
        <div class="group">
          <div class="row">
            <div class="row-left">
              <div class="row-label">Show Shortcuts</div>
            </div>
            <div class="row-right">
              <label class="switch" aria-label="Show shortcuts">
                <input id="showShortcuts" name="showShortcuts" type="checkbox" />
                <span class="slider"></span>
              </label>
            </div>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="section-title">Style</div>
        <div class="group">
          <div class="row">
            <div class="row-left">
              <div class="row-label">Icon Style</div>
              <div class="row-sub">Auto / Light / Dark</div>
            </div>
            <div class="row-right">
              <select id="shortcutIconStyle" class="select" aria-label="Shortcut icon style">
                <option value="auto">Auto</option>
                <option value="light">Light</option>
                <option value="dark">Dark</option>
              </select>
            </div>
          </div>

          <button class="row button" id="resetShortcuts" type="button" aria-label="Reset shortcuts">
            <div class="row-left">
              <div class="row-label">Reset Shortcuts</div>
              <div class="row-sub">Restores default shortcuts</div>
            </div>
            <div class="row-right">
              <span class="chevron" aria-hidden="true">›</span>
            </div>
          </button>
        </div>

        <div class="footer-note" id="status" role="status" aria-live="polite"></div>
      </section>
    </main>
  </div>

  <script src="../settingsStore.js"></script>
  <script src="shortcuts.js"></script>
</body>
</html>
