<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      background: transparent;
      color: #f5f5f7;
      -webkit-font-smoothing: antialiased;
    }

    .popup {
      padding: 16px;
      border-radius: 0;
      background: rgba(28, 28, 30, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: none;
      backdrop-filter: blur(18px) saturate(1.55);
      -webkit-backdrop-filter: blur(18px) saturate(1.55);
    }

    @media (prefers-color-scheme: light) {
      body { color: #1d1d1f; }
      .popup {
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(0, 0, 0, 0.08);
        box-shadow: none;
      }
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .header img {
      width: 40px;
      height: 40px;
      border-radius: 10px;
    }
    .header-text h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }
    .header-text p {
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      margin-top: 1px;
    }
    @media (prefers-color-scheme: light) {
      .header-text p { color: rgba(0,0,0,0.55); }
    }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.12);
      margin: 12px 0;
    }

    @media (prefers-color-scheme: light) {
      .divider { background: rgba(0,0,0,0.08); }
    }

    .action-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 12px;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 12px;
      background: rgba(255,255,255,0.10);
      color: #f5f5f7;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, transform 0.15s;
      margin-bottom: 6px;
    }
    .action-btn:last-child { margin-bottom: 0; }
    .action-btn:hover { background: rgba(255,255,255,0.16); }
    .action-btn:active { transform: translateY(1px); }
    .action-btn .icon { font-size: 16px; flex-shrink: 0; }
    .action-btn .label { font-weight: 500; }

    @media (prefers-color-scheme: light) {
      .action-btn { color: #1d1d1f; background: rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.08); }
      .action-btn:hover { background: rgba(0,0,0,0.05); }
    }

    .footer {
      margin-top: 14px;
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2px;
      color: rgba(255,255,255,0.72);
    }

    @media (prefers-color-scheme: light) {
      .footer { color: rgba(0,0,0,0.68); }
    }
  </style>
</head>
<body>
  <div class="popup">
    <div class="header">
      <img src="assets/icons/icon-128.png" alt="GNT">
      <div class="header-text">
        <h1>GNT: Glass New Tab</h1>
        <p>Version 3.0.0</p>
      </div>
    </div>
    <div class="divider"></div>
    <button class="action-btn" id="openTab" type="button">
      <span class="icon">🏠</span>
      <span class="label">Open New Tab</span>
    </button>
    <div class="footer">Made with ❤️ in India</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
